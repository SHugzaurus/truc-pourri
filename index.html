<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Sliders politiques</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="container">
    <div class="slider-block" style="margin-bottom: 24px;">
        <h1>Position politique</h1>
    </div>

    <div class="party-suggestion">
      <span>Proposition de parti :</span>
      <strong id="partyLabel"></strong>
    </div>

    <section class="sliders">
      <div class="slider-block">
        <label class="slider-title">Orientation</label>
        <div class="labels"><span>Progressiste</span><span>Conservateur</span></div>
        <input type="range" min="0" max="100" value="50" id="s1">
        <div class="value" id="v1">50</div>
      </div>

      <div class="slider-block">
        <label class="slider-title">Économie</label>
        <div class="labels"><span>interventionniste / planificateur</span><span>libéral / capitaliste</span></div>
        <input type="range" min="0" max="100" value="50" id="s2">
        <div class="value" id="v2">50</div>
      </div>

      <div class="slider-block">
        <label class="slider-title">Autorité</label>
        <div class="labels"><span>anarchiste</span><span>Autoritaire</span></div>
        <input type="range" min="0" max="100" value="50" id="s3" step="50">
        <div class="value" id="v3">50</div>
      </div>
    </section>
  </main>

  <script>
  (function(){
    const s1 = document.getElementById('s1');
    const s2 = document.getElementById('s2');
    const s3 = document.getElementById('s3');
    const v1 = document.getElementById('v1');
    const v2 = document.getElementById('v2');
    const v3 = document.getElementById('v3');

    function hexToRgb(hex){
      const h = hex.replace('#','');
      return [parseInt(h.substring(0,2),16),parseInt(h.substring(2,4),16),parseInt(h.substring(4,6),16)];
    }
    function rgbToHex(r,g,b){
      const toHex = v=>Math.max(0,Math.min(255,Math.round(v))).toString(16).padStart(2,'0');
      return '#'+toHex(r)+toHex(g)+toHex(b);
    }
    function lerp(a,b,t){return Math.round(a + (b-a)*t);}    
    function lerpColor(a,b,t){
      const A = hexToRgb(a); const B = hexToRgb(b);
      return rgbToHex(lerp(A[0],B[0],t), lerp(A[1],B[1],t), lerp(A[2],B[2],t));
    }

    function computeBaseColor(){
      const o = parseInt(s1.value,10); // orientation
      const e = parseInt(s2.value,10); // economie
      const avg = (o + e) / 2;

      if(avg <= 25) return '#Ab1cff';
      if(avg <= 50) return '#ff6fbf';
      if(avg <= 75) return '#ff9f3b';
      return '#2b6cb0';
    }

    function refineColor(base){
      const o = parseInt(s1.value,10);
      const e = parseInt(s2.value,10);
      const avg = (o + e) / 2;

      if(avg <= 25){
        if( e > 40) return lerpColor(base, '#ff6fbf', 0.25);
        return base;
      }

      if(avg <= 50){
        if(o < 40) return lerpColor(base, '#ff6fbf', 0.45);
        if(o > 65) return lerpColor(base, '#ff9f3b', 0.35);
        return base;
      }

      if(avg <= 75){
        if(o < 45) return lerpColor(base, '#ff6fbf', 0.35);
        if(e > 70 && o >= 40) return base;
        if(e < 55) return lerpColor(base, '#2b6cb0', 0.25);
        return base;
      }

      if(o < 60) return lerpColor(base, '#ff9f3b', 0.25);
      return base;
    }

    function updateAll(){
      v1.textContent = s1.value;
      v2.textContent = s2.value;
      v3.textContent = s3.value;

      const base = computeBaseColor();
      const refined = refineColor(base);
      const auth = parseInt(s3.value,10);
      const sum = parseInt(s1.value,10) + parseInt(s2.value,10);
      let final = refined;

      // special case: neutral center -> white
      if (parseInt(s1.value,10) === 50 && parseInt(s2.value,10) === 50 && auth === 50) {
        document.body.style.background = '#ffffff';
        return;
      }

      // discrete authority colors based on sum of the first two sliders
      switch (auth) {
        case 0:
          final = sum >= 100 ? '#6b4423' : '#ff0000';
          break;
        case 100:
          final = sum >= 100 ? '#001427' : '#7b0f3f';
          break;
        default:
          break;
      }

      document.body.style.background = final;
      document.getElementById('partyLabel').textContent = getPartyLabel(final);
    }

    function getPartyLabel(color){
      const parties = {
        '#ab1cff': 'LFI',
        '#ff6fbf': 'PS',
        '#ff9f3b': 'Ensemble / MODEM',
        '#2b6cb0': 'LR',
        '#ffffff': '',
        '#6b4423': 'UPR',
        '#ff0000': 'LCR',
        '#001427': 'RN',
        '#7b0f3f': 'NPA'
      };

      function colorDistance(c1, c2) {
        const [r1, g1, b1] = hexToRgb(c1);
        const [r2, g2, b2] = hexToRgb(c2);
        return Math.sqrt((r1-r2)**2 + (g1-g2)**2 + (b1-b2)**2);
      }

      let closestParty = '';
      let minDist = Infinity;

      for (const [hex, party] of Object.entries(parties)) {
        const dist = colorDistance(color, hex);
        if (dist < minDist) {
          minDist = dist;
          closestParty = party;
        }
      }

      return closestParty;
    }


    [s1,s2,s3].forEach(el => el.addEventListener('input', updateAll));
    updateAll();
  })();
  </script>
</body>
</html>
